      - created_at
      - id
      - name
      - parent_name
      - updated_at
    DepartmentEnum:
      enum:
      - ADMIN
      - PLANNING
      - ENVIRONMENT
      - GENERAL
      - HUMAN_RESOURCES
      - MANAGEMENT
      - CLERK
      type: string
      description: |-
        * `ADMIN` - Phòng Quản lý Hành chính
        * `PLANNING` - Phòng Kế hoạch Tài chính
        * `ENVIRONMENT` - Phòng Tài nguyên Môi trường
        * `GENERAL` - Phòng Tổng hợp
        * `HUMAN_RESOURCES` - Phòng Tổ chức Cán bộ
        * `MANAGEMENT` - Ban Giám đốc
        * `CLERK` - Văn thư
