components:
  schemas:
    Agency:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        code:
          type: string
          maxLength: 50
        name:
          type: string
          maxLength: 255
        short_name:
          type: string
          maxLength: 100
        parent:
          type: string
          format: uuid
          nullable: true
        parent_name:
          type: string
          readOnly: true
        is_active:
          type: boolean
        children_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - children_count
      - code
      - created_at
      - id
      - name
      - parent_name
      - updated_at
    AgencyRequest:
      type: object
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 50
        name:
          type: string
          minLength: 1
          maxLength: 255
        short_name:
          type: string
          maxLength: 100
        parent:
          type: string
          format: uuid
          nullable: true
        is_active:
          type: boolean
      required:
      - code
      - name
    AuthToken:
      type: object
      properties:
        token:
          type: string
          readOnly: true
      required:
      - token
    AuthTokenRequest:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - password
      - username
    ConfidentialityEnum:
      enum:
      - UNCLASSIFIED
      - CONFIDENTIAL
      - SECRET
      - TOP_SECRET
      type: string
      description: |-
        * `UNCLASSIFIED` - Không phân loại
        * `CONFIDENTIAL` - Mật
        * `SECRET` - Tuyệt mật
        * `TOP_SECRET` - Tối mật
    Conversation:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        system_prompt:
          type: string
        last_message_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
      required:
      - id
      - last_message_at
      - user
    ConversationCreate:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          maxLength: 255
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - updated_at
    ConversationCreateRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
    ConversationDetailResponse:
      type: object
      properties:
        conversation:
          $ref: '#/components/schemas/Conversation'
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
      required:
      - conversation
      - messages
    Department:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        agency:
          type: string
          format: uuid
        agency_name:
          type: string
          readOnly: true
        code:
          type: string
          maxLength: 50
        name:
          type: string
          maxLength: 255
        short_name:
          type: string
          maxLength: 100
        parent:
          type: string
          format: uuid
          nullable: true
        parent_name:
          type: string
          readOnly: true
        sort_order:
          type: integer
          maximum: 2147483647
          minimum: 0
        is_active:
          type: boolean
        handles_confidential:
          type: boolean
        children_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
